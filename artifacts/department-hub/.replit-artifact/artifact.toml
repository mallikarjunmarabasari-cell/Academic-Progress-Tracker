kind = "web"
previewPath = "/"
title = "DepartmentHub"
version = "1.0.0"
id = "artifacts/department-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23986

[services.development]
run = "pnpm --filter @workspace/department-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/department-hub", "run", "build" ]
publicDir = "artifacts/department-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23986"
BASE_PATH = "/"
