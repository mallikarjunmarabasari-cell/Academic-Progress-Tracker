openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DepartmentHub - Academic Event & Progress Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: events
    description: Event management
  - name: progress
    description: Progress tracking
  - name: ai
    description: AI-powered insights
  - name: users
    description: User management
  - name: departments
    description: Department management
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth endpoints
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out successfully

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  # Events endpoints
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: week
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event (Faculty/Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (Faculty/Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (Faculty/Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted

  /events/upcoming:
    get:
      operationId: listUpcomingEvents
      tags: [events]
      summary: Get upcoming events (next 7 days)
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/stats:
    get:
      operationId: getEventStats
      tags: [events]
      summary: Get event statistics by category and status
      responses:
        "200":
          description: Event stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStats"

  # Progress endpoints
  /progress:
    get:
      operationId: listProgressLogs
      tags: [progress]
      summary: List progress logs
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: week
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of progress logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressLog"
    post:
      operationId: createProgressLog
      tags: [progress]
      summary: Create a progress log (Faculty/Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressLogInput"
      responses:
        "201":
          description: Progress log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressLog"

  /progress/{id}:
    get:
      operationId: getProgressLog
      tags: [progress]
      summary: Get a progress log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Progress log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressLog"
        "404":
          description: Not found
    patch:
      operationId: updateProgressLog
      tags: [progress]
      summary: Update a progress log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressLogUpdate"
      responses:
        "200":
          description: Updated progress log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressLog"
    delete:
      operationId: deleteProgressLog
      tags: [progress]
      summary: Delete a progress log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /progress/stats:
    get:
      operationId: getProgressStats
      tags: [progress]
      summary: Get progress statistics over time
      responses:
        "200":
          description: Progress stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressStats"

  # AI endpoints
  /ai/summaries:
    get:
      operationId: listAiSummaries
      tags: [ai]
      summary: List AI-generated summaries
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of AI summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiSummary"
    post:
      operationId: generateAiSummary
      tags: [ai]
      summary: Generate a new AI summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSummaryInput"
      responses:
        "201":
          description: AI summary generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummary"

  /ai/summaries/{id}:
    get:
      operationId: getAiSummary
      tags: [ai]
      summary: Get a specific AI summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummary"

  /ai/insights:
    get:
      operationId: getAiInsights
      tags: [ai]
      summary: Get the latest AI insights for the department
      responses:
        "200":
          description: AI insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInsights"

  # Dashboard
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (Admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Departments
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Auth schemas
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password, firstName, lastName, role]
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, FACULTY, STUDENT, MANAGEMENT]
        departmentId:
          type: ["integer", "null"]

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # User schemas
    User:
      type: object
      required: [id, email, firstName, lastName, role, isActive, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, FACULTY, STUDENT, MANAGEMENT]
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        isActive:
          type: boolean
        lastLogin:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    UserInput:
      type: object
      required: [email, password, firstName, lastName, role]
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, FACULTY, STUDENT, MANAGEMENT]
        departmentId:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, FACULTY, STUDENT, MANAGEMENT]
        departmentId:
          type: ["integer", "null"]
        isActive:
          type: boolean

    # Department schemas
    Department:
      type: object
      required: [id, name, code, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        headUserId:
          type: ["integer", "null"]
        headUserName:
          type: ["string", "null"]
        memberCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    DepartmentInput:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
        headUserId:
          type: ["integer", "null"]

    DepartmentUpdate:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        headUserId:
          type: ["integer", "null"]

    # Event schemas
    Event:
      type: object
      required: [id, title, category, status, priority, startDate, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [ACADEMIC, EXTRACURRICULAR, ADMINISTRATIVE]
        status:
          type: string
          enum: [PLANNED, ONGOING, COMPLETED, CANCELLED]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        createdById:
          type: integer
        createdByName:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    EventInput:
      type: object
      required: [title, category, status, priority, startDate]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [ACADEMIC, EXTRACURRICULAR, ADMINISTRATIVE]
        status:
          type: string
          enum: [PLANNED, ONGOING, COMPLETED, CANCELLED]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        location:
          type: string
        departmentId:
          type: ["integer", "null"]

    EventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [ACADEMIC, EXTRACURRICULAR, ADMINISTRATIVE]
        status:
          type: string
          enum: [PLANNED, ONGOING, COMPLETED, CANCELLED]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        location:
          type: string

    EventStats:
      type: object
      required: [total, byCategory, byStatus, thisWeek, thisMonth]
      properties:
        total:
          type: integer
        thisWeek:
          type: integer
        thisMonth:
          type: integer
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    # Progress schemas
    ProgressLog:
      type: object
      required: [id, title, weekNumber, year, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        weekNumber:
          type: integer
        year:
          type: integer
        metrics:
          type: ["string", "null"]
        createdById:
          type: integer
        createdByName:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    ProgressLogInput:
      type: object
      required: [title, weekNumber, year]
      properties:
        title:
          type: string
        description:
          type: string
        weekNumber:
          type: integer
        year:
          type: integer
        metrics:
          type: string
        departmentId:
          type: ["integer", "null"]

    ProgressLogUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        metrics:
          type: string

    ProgressStats:
      type: object
      required: [totalLogs, weeklyTrend, recentWeeks]
      properties:
        totalLogs:
          type: integer
        weeklyTrend:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyProgressPoint"
        recentWeeks:
          type: array
          items:
            $ref: "#/components/schemas/ProgressLog"

    WeeklyProgressPoint:
      type: object
      required: [week, year, count]
      properties:
        week:
          type: integer
        year:
          type: integer
        count:
          type: integer

    # AI schemas
    AiSummary:
      type: object
      required: [id, type, content, generatedAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [WEEKLY, MONTHLY, PROGRESS, TREND]
        content:
          type: string
        insights:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        dateRangeStart:
          type: ["string", "null"]
        dateRangeEnd:
          type: ["string", "null"]
        generatedAt:
          type: string

    AiSummaryInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [WEEKLY, MONTHLY, PROGRESS, TREND]
        departmentId:
          type: ["integer", "null"]
        dateRangeStart:
          type: string
        dateRangeEnd:
          type: string

    AiInsights:
      type: object
      required: [summary, recommendations, trends]
      properties:
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
        trends:
          type: array
          items:
            $ref: "#/components/schemas/TrendItem"
        lastUpdated:
          type: ["string", "null"]

    TrendItem:
      type: object
      required: [label, direction, description]
      properties:
        label:
          type: string
        direction:
          type: string
          enum: [UP, DOWN, STABLE]
        description:
          type: string

    # Dashboard schemas
    DashboardStats:
      type: object
      required: [totalEvents, eventsThisWeek, totalProgressLogs, activeStudents, completionRate, totalDepartments]
      properties:
        totalEvents:
          type: integer
        eventsThisWeek:
          type: integer
        totalProgressLogs:
          type: integer
        activeStudents:
          type: integer
        completionRate:
          type: number
        totalDepartments:
          type: integer
        upcomingEvents:
          type: integer
        recentAiSummaries:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, title, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [EVENT_CREATED, EVENT_UPDATED, PROGRESS_LOGGED, AI_SUMMARY_GENERATED, USER_REGISTERED]
        title:
          type: string
        description:
          type: string
        userName:
          type: ["string", "null"]
        createdAt:
          type: string
